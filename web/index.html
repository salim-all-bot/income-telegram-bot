<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invite & Earn</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
<h2>Invite & Earn Money</h2>
</div>

<div id="page">

<div id="home">
<h3>Balance: <span id="bal">0</span> Tk</h3>

<button onclick="watchAd()">Watch Ad (+5)</button>

</div>

<div id="ref">
<h3>Your Referral Link</h3>
<p id="link"></p>
</div>

<div id="wallet">
<h3>Withdraw</h3>
<input placeholder="Number">
<input placeholder="Amount">
<button>Submit</button>
</div>

<div id="account">
<h3>Account</h3>
<p id="user"></p>
</div>

<div id="leader">
<h3>Leaderboard</h3>
<p>1. sali*</p>
<p>2. maru*</p>
<p>3. rafi*</p>
</div>

</div>

<div class="menu">

<button onclick="show('home')">Home</button>
<button onclick="show('ref')">Refer</button>
<button onclick="show('wallet')">Wallet</button>
<button onclick="show('account')">Account</button>
<button onclick="show('leader')">Leaderboard</button>

</div>

<script src="script.js"></script>

</body>
</html>
